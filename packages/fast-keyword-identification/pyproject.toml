[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "fast-keywords"
version = "0.1.0"
description = "Fast keyword identification with n-gram vector string matching."
license = { text = "MIT" }
authors = [{ name = "Christian Johnson" }]
requires-python = ">=3.8"
readme = "README.md"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
]
dependencies = [
    "pandas>=1.2",
    "scikit-learn>=0.24",
    "sparse-dot-topn>=0.2.9,<1.0",
    "dill>=0.3.1",
    "nltk>=3.5",
    "tqdm>=4.47",
]

[project.urls]
Homepage = "https://github.com/christianj6/fast-keyword-identification"

[tool.setuptools.packages.find]
where = ["."]

[tool.setuptools.package-data]
"fast_keywords.res" = ["*.txt"]
"res" = ["*.txt", "*.csv"]
